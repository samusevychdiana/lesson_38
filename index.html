<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .qwe {
            width: 150px;
            height: 100px;
            border-radius: 50px;
            background-color: rgb(89, 161, 206);
            transition-property: background-color, border-radius, height;
            transition-duration: 5s;
            transition-timing-function: linear;
        }

        .qwe:hover {
            background-color: aquamarine;
            border-radius: 70px;
            height: 250px;
        }
    </style>

</head>
<body>
    <div class="qwe"></div>
</body>
</html>
